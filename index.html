<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>整体施術マニュアル</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #fafaf6; }
  body { font-family: "Noto Sans JP", system-ui, sans-serif; }
  * { box-sizing: border-box; }
  mark { background: rgba(255,220,80,0.5); color: inherit; }
  #root { height: 100vh; overflow: hidden; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 4px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="manual-data.js"></script>
<script type="text/babel" src="tweaks-panel.js"></script>
<script type="text/babel" src="manual-component.js"></script>

<script type="text/babel">
const ACCENT_DEFAULT = "#d97048";

function makeTheme(accent) {
  return {
    bg: '#fafaf6',
    sidebarBg: '#f4f2ec',
    border: '#e4e2d8',
    accent,
    heading: '#1f2620',
    body: '#3a4038',
    muted: '#8a8d85',
    headingFont: '"Noto Sans JP", system-ui, sans-serif',
    bodyFont: '"Noto Sans JP", system-ui, sans-serif',
    numberFont: '"JetBrains Mono", ui-monospace, monospace',
  };
}

function App() {
  const [tweaks, setTweak] = useTweaks({ accent: ACCENT_DEFAULT });
  const theme = React.useMemo(() => makeTheme(tweaks.accent), [tweaks.accent]);

  const [vw, setVw] = React.useState(window.innerWidth);
  React.useEffect(() => {
    const onResize = () => setVw(window.innerWidth);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  return (
    <>
      <div style={{ height: '100vh', width: '100vw' }}>
        <ManualApp theme={theme} viewportWidth={vw} />
      </div>

      <TweaksPanel title="Tweaks · カラーテーマ">
        <TweakSection title="アクセントカラー">
          <TweakColor label="アクセント" value={tweaks.accent} onChange={(v) => setTweak('accent', v)} />
        </TweakSection>
        <TweakSection title="プリセット">
          <TweakButton onClick={() => setTweak({ accent: '#d97048' })}>暖色（オレンジ）</TweakButton>
          <TweakButton onClick={() => setTweak({ accent: '#3a8a6a' })}>緑系</TweakButton>
          <TweakButton onClick={() => setTweak({ accent: '#5a7ac4' })}>青系</TweakButton>
          <TweakButton onClick={() => setTweak({ accent: '#a04a8a' })}>紫系</TweakButton>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
