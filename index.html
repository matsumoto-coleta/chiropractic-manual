<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>整体施術マニュアル</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #fafaf6; }
  body { font-family: "Noto Sans JP", system-ui, sans-serif; }
  * { box-sizing: border-box; }
  mark { background: rgba(255,220,80,0.5); color: inherit; }
  #root { height: 100vh; overflow: hidden; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 4px; }
  @page { size: A4; margin: 15mm 20mm; }
  @media print {
    html, body { height: auto !important; overflow: visible !important; }
    #root { height: auto !important; overflow: visible !important; }
    #app-layout { display: block !important; height: auto !important; overflow: visible !important; }
    nav, header, .twk-panel { display: none !important; }
    main { overflow: visible !important; height: auto !important; padding-top: 0 !important; }
    /* ステップのみ印刷 */
    #section-intro, .section-header, .section-pre, footer { display: none !important; }
    section { padding: 0 !important; background: white !important; }
    /* ステップカード展開・改ページ */
    .step-card-content { max-height: none !important; opacity: 1 !important; overflow: visible !important; }
    .step-card { break-inside: avoid; border: 1px solid #e4e2d8 !important; box-shadow: none !important; margin-bottom: 12px; }
    .print-break { break-after: page !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
